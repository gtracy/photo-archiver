name: Deploy Lambdas to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manual triggers from the GitHub UI

permissions:
  id-token: write # Required for AWS OIDC credentials
  contents: read  # Required for checkout

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      photo_migrate: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.photo_migrate == 'true' }}
      photo_resize: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.photo_resize == 'true' }}
      bucket_validator: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.bucket_validator == 'true' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            photo_migrate:
              - 'photo_migrate/**'
            photo_resize:
              - 'photo_resize/**'
            bucket_validator:
              - 'bucket_validator/**'

  deploy-photo-migrate:
    name: Deploy memories-photo-migration
    needs: changes
    if: needs.changes.outputs.photo_migrate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'photo_migrate/package-lock.json'

      - name: Install Dependencies
        run: |
          cd photo_migrate
          npm ci --omit=dev

      - name: Package Code
        run: |
          cd photo_migrate
          zip -r function.zip . -x "creds*.json" ".env*.json" "function.zip" "test/*" "*.md"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2
          audience: sts.amazonaws.com

      - name: Deploy Code to Lambda
        run: |
          cd photo_migrate
          aws lambda update-function-code \
            --function-name memories-photo-migration \
            --zip-file fileb://function.zip

      - name: Wait for Lambda Update to Complete
        run: |
          aws lambda wait function-updated \
            --function-name memories-photo-migration

      - name: Update Lambda Configuration
        run: |
          cat << 'EOF' > env.json
          {
            "Variables": {
              "GOOGLE_SHEET_ID": ${{ toJSON(vars.GOOGLE_SHEET_ID) }},
              "GOOGLE_SHEET_NAME": ${{ toJSON(vars.GOOGLE_SHEET_NAME) }},
              "GOOGLE_SHEET_RANGE": ${{ toJSON(vars.GOOGLE_SHEET_RANGE) }},
              "S3_BUCKET": ${{ toJSON(vars.S3_BUCKET) }},
              "GOOGLE_CREDENTIALS_JSON": ${{ toJSON(secrets.GOOGLE_CREDENTIALS_JSON) }}
            }
          }
          EOF
          aws lambda update-function-configuration \
            --function-name memories-photo-migration \
            --environment file://env.json

  deploy-photo-resize:
    name: Deploy photoResize
    needs: changes
    if: needs.changes.outputs.photo_resize == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'photo_resize/package-lock.json'

      - name: Install Dependencies
        run: |
          cd photo_resize
          # Standard npm ci on linux x64 compiles sharp natively for the x86_64 runtime
          npm ci --omit=dev

      - name: Package Code
        run: |
          cd photo_resize
          zip -r function.zip . -x "function.zip" "test/*" "*.md"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2
          audience: sts.amazonaws.com

      - name: Deploy Code to Lambda
        run: |
          cd photo_resize
          aws lambda update-function-code \
            --function-name photoResize \
            --zip-file fileb://function.zip

  deploy-bucket-validator:
    name: Deploy memories-photo-validator
    needs: changes
    if: needs.changes.outputs.bucket_validator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'bucket_validator/package-lock.json'

      - name: Install Dependencies
        run: |
          cd bucket_validator
          npm ci --omit=dev

      - name: Package Code
        run: |
          cd bucket_validator
          zip -r function.zip . -x "function.zip" "test/*" "*.md"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2
          audience: sts.amazonaws.com

      - name: Deploy Code to Lambda
        run: |
          cd bucket_validator
          aws lambda update-function-code \
            --function-name memories-photo-validator \
            --zip-file fileb://function.zip

      - name: Wait for Lambda Update to Complete
        run: |
          aws lambda wait function-updated \
            --function-name memories-photo-validator

      - name: Update Lambda Configuration
        run: |
          cat << 'EOF' > env.json
          {
            "Variables": {
              "S3_BUCKET": ${{ toJSON(vars.S3_BUCKET) }}
            }
          }
          EOF
          aws lambda update-function-configuration \
            --function-name memories-photo-validator \
            --environment file://env.json
